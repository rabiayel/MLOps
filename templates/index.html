<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maaş Tahmin AI Sistemi</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#021B79,#0575E6,#00C6FF);
            overflow:hidden;
            position:relative;
            padding:20px;
        }

        /* Background Glow Effects */
        body::before{
            content:'';
            position:absolute;
            width:600px;
            height:600px;
            background:rgba(255,255,255,0.08);
            border-radius:50%;
            top:-200px;
            left:-150px;
            filter:blur(40px);
        }

        body::after{
            content:'';
            position:absolute;
            width:500px;
            height:500px;
            background:rgba(255,255,255,0.07);
            border-radius:50%;
            bottom:-180px;
            right:-120px;
            filter:blur(50px);
        }

        .container{
            position:relative;
            z-index:10;
            width:450px;
            padding:40px;
            border-radius:30px;
            background:rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            border:1px solid rgba(255,255,255,0.2);
            box-shadow:
            0 8px 32px rgba(0,0,0,0.25),
            inset 0 0 20px rgba(255,255,255,0.08);

            animation: float 4s ease-in-out infinite;
        }

        @keyframes float{
            0%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-10px);
            }
            100%{
                transform:translateY(0px);
            }
        }

        .ai-badge{
            position:absolute;
            top:-18px;
            right:20px;
            background:#00C6FF;
            color:white;
            padding:8px 18px;
            border-radius:50px;
            font-size:13px;
            font-weight:600;
            letter-spacing:1px;
            box-shadow:0 4px 15px rgba(0,198,255,0.5);
        }

        .title{
            text-align:center;
            color:white;
            font-size:32px;
            font-weight:700;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:rgba(255,255,255,0.85);
            font-size:14px;
            line-height:1.7;
            margin-bottom:35px;
        }

        .input-group{
            margin-bottom:22px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:white;
            font-weight:500;
            font-size:15px;
        }

        input{
            width:100%;
            padding:15px;
            border:none;
            outline:none;
            border-radius:15px;
            background:rgba(255,255,255,0.15);
            color:white;
            font-size:16px;
            transition:0.3s;
            border:1px solid rgba(255,255,255,0.2);
        }

        input::placeholder{
            color:rgba(255,255,255,0.6);
        }

        input:focus{
            transform:scale(1.03);
            background:rgba(255,255,255,0.22);
            box-shadow:0 0 20px rgba(0,198,255,0.6);
        }

        .btn{
            width:100%;
            padding:16px;
            border:none;
            border-radius:18px;
            background:linear-gradient(90deg,#00C6FF,#0072FF);
            color:white;
            font-size:18px;
            font-weight:600;
            cursor:pointer;
            transition:0.4s;
            box-shadow:0 8px 20px rgba(0,114,255,0.45);
        }

        .btn:hover{
            transform:translateY(-3px) scale(1.02);
            box-shadow:0 12px 30px rgba(0,114,255,0.7);
        }

        /* Prediction Result Box */

        .result-box{
            margin-top:30px;
            padding:25px;
            border-radius:20px;
            text-align:center;
            background:rgba(255,255,255,0.15);
            border:1px solid rgba(255,255,255,0.2);
            color:white;

            animation: glow 2s infinite alternate;
        }

        @keyframes glow{
            from{
                box-shadow:0 0 15px rgba(0,198,255,0.4);
            }

            to{
                box-shadow:0 0 35px rgba(0,198,255,0.9);
            }
        }

        .result-title{
            font-size:26px;
            margin-bottom:10px;
        }

        .prediction{
            font-size:42px;
            font-weight:700;
            color:#00ffcc;
        }

        .footer{
            margin-top:25px;
            text-align:center;
            color:rgba(255,255,255,0.7);
            font-size:12px;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="ai-badge">
            AI POWERED
        </div>

        <h1 class="title">
            Maaş Tahmin AI
        </h1>

        <p class="subtitle">
            Yapay zeka modeli; tecrübe, yazılı sınav ve mülakat performansına göre tahmini maaş analizi yapar.
        </p>

        <form action="/predict" method="post">

            <div class="input-group">
                <label for="tecrube">
                    💼 Tecrübe (Yıl)
                </label>

                <input 
                    type="number" 
                    id="tecrube" 
                    name="tecrube" 
                    placeholder="Örn: 5"
                    required
                >
            </div>

            <div class="input-group">
                <label for="yazili">
                    📝 Yazılı Sınav Notu
                </label>

                <input 
                    type="number" 
                    id="yazili" 
                    name="yazili" 
                    placeholder="Örn: 85"
                    required
                >
            </div>

            <div class="input-group">
                <label for="mulakat">
                    🎤 Mülakat Puanı
                </label>

                <input 
                    type="number" 
                    id="mulakat" 
                    name="mulakat" 
                    placeholder="Örn: 90"
                    required
                >
            </div>

            <button type="submit" class="btn">
                🚀 Maaşı Tahmin Et
            </button>

        </form>

        <!-- Jinja Prediction Result -->

        {% if prediction is defined %}

        <div class="result-box">

            <h2 class="result-title">
                💰 Tahmini Maaş
            </h2>

            <div class="prediction">
               ${{ prediction | round(2) }} 
            </div>

        </div>

        {% endif %}

        <div class="footer">
            Machine Learning • Deep Learning • AI UI Design
        </div>

    </div>

</body>
</html>
